<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BandApp Pro - Live Sync</title>
  
  <link rel="icon" href="/icon-512.png">

<link rel="apple-touch-icon" href="/icon-512.png">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black">

<meta name="apple-mobile-web-app-title" content="BandApp">

<link rel="manifest" href="/manifest.json">

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    :root{
      --bg:#000;
      --text:#eee;
      --accent:#ff9800;
      --edit:#2196F3;

      --pu-bg: rgba(168, 85, 247, 0.16);
      --pu-border: rgba(168, 85, 247, 0.55);
      --pu-text: var(--text);

      --nav-bg:#1a1a1a;
      --nav-text:#eee;
      --panel-bg:#111;
      --panel-border:#333;

      --chorus-bg:#111827;
      --chorus-border:#60a5fa;
      --chorus-text: var(--text);

      --comment-bg:#ffd54f;
      --comment-text:#000;
    }
	
	.meta-form{
  color: var(--text);
}

.meta-form label{
  display:grid;
  gap:6px;
  color: var(--text);
}

.meta-form .meta-label{
  color: #eee;
  font-weight: 700;
}

.meta-form input,
.meta-form select,
.meta-form textarea{
  width:100%;
  padding:10px;
  box-sizing:border-box;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #444;
  border-radius:8px;
}
	
	#leaderFloatingActions{
  display:none;
  position:fixed;
  top:72px;
  left:0;
  right:0;
  z-index:30;
  pointer-events:none;
}

.center-btn{
  left:50%;
  transform:translateX(-50%);
}

#concertFloatingActions{
  position:fixed;
  top:72px;
  left:0;
  right:0;
  z-index:29;
  pointer-events:none;
}

#concertFloatingActions .concert-float-btn{
  position:absolute;
  pointer-events:auto;
  background:rgba(0,0,0,0.72);
  backdrop-filter: blur(6px);
}

.center-btn{
  left:50%;
  transform:translateX(-50%);
}

body.concert-mode nav{
  display:none !important;
}

body.concert-mode #viewer{
  height:100vh;
  padding-top:20px;
}

body.concert-mode #notesPanel{
  display:none !important;
}

body.concert-mode #leaderFloatingActions{
  top:12px;
}

body.concert-mode #concertFloatingActions{
  top:12px;
}

body.concert-mode #settingsFixedWrap{
  display:none !important;
}

#concertModeBtn.active-btn{
  background:rgba(255,152,0,0.25);
  color:#fff;
}

#leaderFloatingActions .leader-float-btn{
  position:absolute;
  pointer-events:auto;
  background:rgba(0,0,0,0.72);
  backdrop-filter: blur(6px);
}

#leaderPlayBtn{
  left:12px;
  top:0;
}

#playedToggleBtn{
  left:12px;
  top:52px;
}

#randomSongBtn{
  right:12px;
  top:0;
}

    body{
      font-family:sans-serif;
      background:var(--bg);
      color:var(--text);
      margin:0;
      overflow:hidden;
      overscroll-behavior-x:none;
    }

    .version-badge{
      font-weight:900;
      font-size:12px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.08);
      color:var(--text);
      white-space:nowrap;
    }

    .version-badge.perso{
      border-color: rgba(59,130,246,0.55);
      background: rgba(59,130,246,0.18);
    }

    .version-badge.off{
      border-color: rgba(255,152,0,0.55);
      background: rgba(255,152,0,0.18);
    }

    #netBadge.off{
      border-color: rgba(244,67,54,0.55);
      background: rgba(244,67,54,0.18);
    }

    #netBadge.on{
      border-color: rgba(76,175,80,0.55);
      background: rgba(76,175,80,0.18);
    }

#settingsFixedWrap{
  position:fixed;
  top:10px;
  right:10px;
  z-index:6000;
  display:flex;
  align-items:center;
  gap:8px;
}

    #settingsBtnFixed{
      border:2px solid var(--accent);
      border-radius:10px;
      background:rgba(0,0,0,0.25);
      color:var(--accent);
      font-weight:900;
      padding:10px 12px;
      cursor:pointer;
      backdrop-filter: blur(6px);
    }

    #toast{
      position:fixed;
      left:50%;
      top:18px;
      transform:translateX(-50%);
      z-index:7000;
      background:rgba(0,0,0,0.85);
      color:#fff;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.15);
      display:none;
      font-size:14px;
      font-weight:700;
      max-width:min(92vw, 520px);
      text-align:center;
    }

    #userOverlay{
      position:fixed;
      inset:0;
      z-index:5000;
      display:none;
      background:rgba(0,0,0,0.92);
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    #userModal{
      width:min(560px,100%);
      background:#111;
      border:1px solid #2a2a2a;
      border-radius:14px;
      overflow:hidden;
    }

    #userModal header{
      padding:14px 16px;
      border-bottom:1px solid #2a2a2a;
      background:#161616;
    }

    #userModal header h3{
      margin:0;
      font-size:14px;
      color:#fff;
    }

    #userModal .content{ padding:14px 16px; }

    #userModal .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .user-choice{
      border:1px solid #333;
      background:#0b0b0b;
      border-radius:12px;
      padding:12px;
      cursor:pointer;
      text-align:center;
      font-weight:bold;
      color:#fff;
      user-select:none;
    }

    .user-choice:hover{ background:#101010; }

    #userModal .actions{
      padding:14px 16px;
      border-top:1px solid #2a2a2a;
      display:flex;
      justify-content:flex-start;
      gap:10px;
      flex-wrap:wrap;
    }

    #library{
      height:100vh;
      overflow-y:auto;
      display:block;
      -webkit-overflow-scrolling:touch;
    }

    .lib-header{
      padding:20px;
      padding-right:420px;
      background:var(--nav-bg);
      border-bottom:2px solid var(--accent);
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:5;
      color:var(--nav-text);
      gap:12px;
    }

    .song-item{
      padding:20px;
      border-bottom:1px solid #222;
      display:flex;
      justify-content:space-between;
      font-size:1.1em;
      cursor:pointer;
    }

    #viewer-container{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100vw;
      height:100vh;
      background:var(--bg);
      z-index:10;
    }
	
	.song-item.played{
  opacity:0.6;
}

.song-left{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}

.song-title{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.song-badge{
  font-size:11px;
  font-weight:900;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);
  color:var(--text);
  white-space:nowrap;
}

.song-badge.played{
  border-color: rgba(76,175,80,0.55);
  background: rgba(76,175,80,0.18);
}

nav{
  display:flex;
  background:var(--nav-bg);
  color:var(--nav-text);
  min-height:60px;
  align-items:center;
  padding:6px 10px;
  gap:8px;
  border-bottom:1px solid var(--panel-border);
  flex-wrap:wrap;
}

#viewer-container nav .btn,
#viewer-container nav input[type="range"]{
  flex-shrink:0;
}

    .controls-group{
      display:flex;
      align-items:center;
      gap:5px;
      background:rgba(255,255,255,0.06);
      padding:5px;
      border-radius:8px;
    }

    #updateBanner{
      position:sticky;
      top:0;
      z-index:999;
      display:none;
      background:rgba(255,255,255,0.06);
      border-bottom:1px solid var(--panel-border);
      padding:10px 12px;
      font-size:14px;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      color:var(--text);
    }

    #updateBanner .msg{ color:var(--text); }

    #updateBanner .btn-small{
      padding:8px 10px;
      border-radius:6px;
      font-size:12px;
    }

    #notesPanel{
      display:none;
      background:var(--panel-bg);
      border-bottom:1px solid var(--panel-border);
      padding:12px;
    }

    #notesTextarea{
      width:100%;
      min-height:120px;
      background:#000;
      color:#0f0;
      border:1px solid #333;
      padding:10px;
      font-family:monospace;
      resize:vertical;
      box-sizing:border-box;
    }

    #viewer{
      height:calc(100vh - 65px);
      overflow-y:scroll;
      padding:25px;
      font-family:'Courier New', Courier, monospace;
      -webkit-overflow-scrolling:touch;
      scroll-behavior:auto !important;
      touch-action:pan-y;
    }

    .block{ margin-bottom:26px; }

    .chordline,.lyricline{
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      line-height:1.6;
      margin:0;
    }

    .chordline{ color:var(--accent); font-weight:bold; }

    .commentwrap{ margin:12px 0; }

    .commentline{
      display:inline-block;
      background:var(--comment-bg);
      color:var(--comment-text);
      padding:6px 10px;
      border-radius:8px;
      font-family:sans-serif;
      font-weight:900;
      font-size:18px;
      line-height:1.2;
    }

    .chorus-block{
      background:var(--chorus-bg);
      border-left:4px solid var(--chorus-border);
      padding:12px 12px;
      border-radius:12px;
      margin:14px 0;
      color:var(--chorus-text);
    }

    .pu-block{
      margin:14px 0;
      border-left:4px solid var(--pu-border);
      padding:10px 12px;
      border-radius:12px;
      background: var(--pu-bg);
      color: var(--pu-text);
    }

    .pu-label{
      font-family:sans-serif;
      font-weight:900;
      font-size:12px;
      opacity:.65;
      margin-bottom:8px;
    }

    .pu-pre{
      margin:0;
      white-space:pre;
      overflow-x:auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      font-size: calc(14px * var(--song-zoom, 1));
      line-height: calc(17.5px * var(--song-zoom, 1));
    }

    #editor-container{
      display:none;
      position:fixed;
      top:60px;
      left:0;
      right:0;
      bottom:0;
      background:#111;
      z-index:20;
      flex-direction:column;
    }

    #editor-warning{
      flex:0 0 auto;
      background:rgba(255, 87, 34, 0.14);
      border-bottom:1px solid rgba(255, 87, 34, 0.4);
      color:#ffd7c7;
      padding:12px 14px;
      font-size:13px;
      font-weight:800;
      line-height:1.35;
      text-transform:uppercase;
    }

    #editor-toolbar{
      flex:0 0 auto;
      padding:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      border-bottom:1px solid #2a2a2a;
      background:rgba(255,255,255,0.03);
    }

    #editor-textarea{
      flex:1 1 auto;
      min-height:0;
      width:100%;
      background:#000;
      color:#2196F3;
      border:none;
      font-family:monospace;
      font-size:16px;
      padding:20px;
      box-sizing:border-box;
      resize:none;
    }

    .editor-footer{
      position:sticky;
      bottom:0;
      z-index:2;
      flex:0 0 auto;
      min-height:74px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:20px;
      background:var(--nav-bg);
      padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 8px);
      border-top:1px solid rgba(255,255,255,0.08);
    }

    .btn{
      cursor:pointer;
      padding:10px 14px;
      border:2px solid var(--accent);
      border-radius:6px;
      color:var(--accent);
      background:none;
      font-size:13px;
      font-weight:bold;
    }

    .btn-blue{ border-color:var(--edit); color:var(--edit); }

    .active-btn{ background:#444; color:#fff; }

    .leader-only{
      display:none;
    }

    #songContent { position: relative; }

    #overlayLayer{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:3;
    }

    .gridOverlay{
      position:absolute;
      left:0;
      right:0;
      padding:0 6px;
      pointer-events:auto;
    }

    .gridOverlay .box{
      display:inline-block;
      max-width:100%;
      background: rgba(34, 197, 94, 0.18);
      border: 1px solid rgba(34, 197, 94, 0.45);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.25;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

#connectedUsersBox{
  border:1px solid var(--panel-border);
  background:var(--panel-bg);
  border-radius:8px;
  padding:10px;
  margin-top:10px;
}

#connectedUsersTitle{
  color: var(--text);
  font-weight:600;
}

#connectedUsersList{
  white-space:pre-line;
  line-height:1.5;
  font-size:14px;
  color: var(--text);
}

  </style>
</head>

<body>

  <div id="toast"></div>

  <div id="userOverlay">

async function deleteCurrentSong() {

    const res = await fetch('/delete-song', {

        pin: cleanPin,

function getMetaValues(fieldName) {
  const values = new Set();

  Object.values(songMeta || {}).forEach(entry => {
    const v = entry?.[fieldName];

    if (Array.isArray(v)) {
      v.forEach(x => {
        const clean = String(x || '').trim();
        if (clean) values.add(clean);
      });
    } else {
      const clean = String(v || '').trim();
      if (clean) values.add(clean);
    }
  });

  return [...values].sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }));
}

function fillSelectOptions(selectEl, values, multiple = false) {
  if (!selectEl) return;

  selectEl.innerHTML = '';

  if (!multiple) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = 'â€”';
    selectEl.appendChild(opt);
  }

  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    selectEl.appendChild(opt);
  });
}

function setSelectedValues(selectEl, values) {
  const arr = Array.isArray(values) ? values.map(v => String(v)) : [String(values || '')];

  [...selectEl.options].forEach(opt => {
    opt.selected = arr.includes(opt.value);
  });
}

function getSelectedValues(selectEl) {
  return [...selectEl.selectedOptions].map(opt => opt.value).filter(Boolean);
}

function prepareSongMetaFormSelections(data = {}) {
  const defaultCategories = ['RĂ©pertoire', 'En travail', '1 minute', 'Archives'];
  const categories = [...new Set([...defaultCategories, ...getMetaValues('category')])];
  const styles = getMetaValues('style');
  const ambiances = getMetaValues('ambiance');
  const audiences = getMetaValues('audience');
  const chanteurs = getMetaValues('chanteur');

  fillSelectOptions(songMetaCategory, categories, false);
  fillSelectOptions(songMetaStyle, styles, true);
  fillSelectOptions(songMetaAmbiance, ambiances, false);
  fillSelectOptions(songMetaAudience, audiences, true);
  fillSelectOptions(songMetaChanteur, chanteurs, true);

  songMetaCategory.value = data?.category || 'RĂ©pertoire';
  songMetaAmbiance.value = data?.ambiance || '';

  setSelectedValues(songMetaStyle, Array.isArray(data?.style) ? data.style : []);
  setSelectedValues(songMetaAudience, Array.isArray(data?.audience) ? data.audience : []);
  setSelectedValues(songMetaChanteur, Array.isArray(data?.chanteur) ? data.chanteur : []);
}

async function saveSongMetaModal() {
  const pin = prompt("PIN requis") || "";
  const cleanPin = String(pin).trim();
  if (!cleanPin) return;

  try {
    let res;

    if (songMetaMode === 'create') {
      const title = String(songMetaTitleInput.value || "").trim();
      const artist = String(songMetaArtistInput.value || "").trim();

      if (!title) {
        alert("Titre du morceau requis");
        return;
      }

      if (!artist) {
        alert("Artiste requis");
        return;
      }

      const fileName = `${title} - ${artist}.pro`;

      const payload = {
        fileName,
        pin: cleanPin,
        title,
        artist,
        category: songMetaCategory.value,
        style: getSelectedValues(songMetaStyle),
        ambiance: songMetaAmbiance.value,
        audience: getSelectedValues(songMetaAudience),
        chanteur: getSelectedValues(songMetaChanteur)
      };

      res = await fetch('/create-song', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } else {
      const fileName = String(songMetaFileName.value || "").trim();
      if (!fileName) {
        alert("Nom de fichier requis");
        return;
      }

      const payload = {
        fileName,
        pin: cleanPin,
        title: songMetaTitleInput.value,
        artist: songMetaArtistInput.value,
        category: songMetaCategory.value,
        style: getSelectedValues(songMetaStyle),
        ambiance: songMetaAmbiance.value,
        audience: getSelectedValues(songMetaAudience),
        chanteur: getSelectedValues(songMetaChanteur)
      };

      res = await fetch('/save-song-meta', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    }

    if (res.ok) {
      closeSongMetaModal();
      await fetchSongMeta();
      await fetchSongs();
      filterSongList(songSearchInput?.value || "");

      if (songMetaMode === 'create') {
        showToast("Morceau crĂ©Ă© âś…");
      } else {
        showToast("Infos morceau enregistrĂ©es âś…");
      }
    } else if (res.status === 403) {
      alert("PIN invalide");
    } else if (res.status === 409) {
      alert("Le morceau existe dĂ©jĂ ");
    } else {
      const txt = await res.text();
      alert("Erreur d'enregistrement : " + txt);
    }
  } catch (err) {
    console.error(err);
    alert("Erreur d'enregistrement");
  }
}

function normalizeText(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '') // enlĂ¨ve les accents
    .replace(/[â€™`]/g, "'")           // unifie les apostrophes
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}

function normName(value) {
  return normalizeText(value);
}

function normalizeMetaArray(value) {
  if (Array.isArray(value)) {
    return value
      .map(v => normalizeText(v))
      .filter(Boolean);
  }

  if (value == null || value === '') return [];

  return [normalizeText(value)].filter(Boolean);
}

function getMetaForSong(song) {
  if (songMeta[song]) return songMeta[song];

  const wanted = normName(song);
  const realKey = Object.keys(songMeta).find(k => normName(k) === wanted);

  return realKey ? songMeta[realKey] : {};
}

function songMatchesFilters(song, query) {
  const meta = getMetaForSong(song);

  const selectedCategory = normalizeText(categoryFilterEl?.value || "");
  const selectedStyle = normalizeText(styleFilterEl?.value || "");
  const selectedAmbiance = normalizeText(ambianceFilterEl?.value || "");
  const selectedAudience = normalizeText(audienceFilterEl?.value || "");
  const selectedSinger = normalizeText(singerFilterEl?.value || "");
  const selectedPlayed = normalizeText(playedFilterEl?.value || "");
  const normalizedQuery = normalizeText(query || "");

  const searchableText = normalizeText([
    song,
    meta.title || '',
    meta.artist || '',
    meta.category || '',
    meta.ambiance || '',
    ...(Array.isArray(meta.style) ? meta.style : []),
    ...(Array.isArray(meta.audience) ? meta.audience : []),
    ...(Array.isArray(meta.chanteur) ? meta.chanteur : [])
  ].join(' '));

  const category = normalizeText(meta.category || '');
  const ambiance = normalizeText(meta.ambiance || '');
  const styleValues = normalizeMetaArray(meta.style);
  const audienceValues = normalizeMetaArray(meta.audience);
  const singerValues = normalizeMetaArray(meta.chanteur);

  const played = isPlayedTonight(song) ? "played" : "unplayed";

  const matchQuery = !normalizedQuery || searchableText.includes(normalizedQuery);
  const matchCategory = !selectedCategory || category === selectedCategory;
  const matchStyle = !selectedStyle || styleValues.includes(selectedStyle);
  const matchAmbiance = !selectedAmbiance || ambiance === selectedAmbiance;
  const matchAudience = !selectedAudience || audienceValues.includes(selectedAudience);
  const matchSinger = !selectedSinger || singerValues.includes(selectedSinger);
  const matchPlayed = !selectedPlayed || played === selectedPlayed;

  return (
    matchQuery &&
    matchCategory &&
    matchStyle &&
    matchAmbiance &&
    matchAudience &&
    matchSinger &&
    matchPlayed
  );
}

  function getTopLyricAnchorState() {
    const blocks = viewerElement.querySelectorAll('[data-kind="lyric"][data-anchor]');
    if (!blocks.length) return null;

    const st = viewerElement.scrollTop;
    for (const el of blocks) {
      const top = el.offsetTop;
      const h = el.offsetHeight || 1;
      if (top + h > st + 8) {
        const progress = clamp01((st - top) / h);
        return { anchor: el.dataset.anchor, progress };
      }
    }

    const last = blocks[blocks.length - 1];
    return { anchor: last.dataset.anchor, progress: 1 };
  }

  let lastEmitAt = 0;
  let lastEmitAnchor = "";
  let lastEmitProg = -1;

  viewerElement.addEventListener('scroll', () => {
    if (!isLeader || isRemoteScrolling || isScrolling) return;

    const state = getTopLyricAnchorState();
    if (!state) return;

    const now = Date.now();
    if (
      now - lastEmitAt < 120 &&
      state.anchor === lastEmitAnchor &&
      Math.abs(state.progress - lastEmitProg) < 0.05
    ) {
      return;
    }

    lastEmitAt = now;
    lastEmitAnchor = state.anchor;
    lastEmitProg = state.progress;

    socket.emit('scroll-sync', state);
  });

    : null;

  let targetTop;
  if (el) {
    const top = el.offsetTop;
    const h = el.offsetHeight || 1;
    targetTop = top + progress * h;
  } else {
    const max = viewerElement.scrollHeight - viewerElement.clientHeight;
    targetTop = progress * (max > 0 ? max : 0);
  }

  if (Math.abs(viewerElement.scrollTop - targetTop) < 8) return;

  function sliderToPxPerSecond(value) {
    const v = Number(value) || 50;
    const delayMs = Math.max(10, 105 - v);
    return 1000 / delayMs;
  }

  function autoScrollLoop(t) {
    if (!isScrolling) return;

    if (!lastRafTime) lastRafTime = t;
    const dt = t - lastRafTime;
    lastRafTime = t;

    const pxPerSec = sliderToPxPerSecond(speedInput.value);
    const deltaPx = (dt / 1000) * pxPerSec;

    scrollCarry += deltaPx;
    const step = Math.floor(scrollCarry);

    if (step >= 1) {
      viewerElement.scrollTop += step;
      scrollCarry -= step;
    }

    rafId = requestAnimationFrame(autoScrollLoop);
  }

    document.getElementById('transposeVal').innerText = (transposeValue > 0 ? '+' : '') + transposeValue;
    renderChordPro();
    renderGrids();

    if (isLeader) {
      socket.emit('leader-transpose', transposeValue);
    }
  }

  function toggleChordStyle() {
    chordStyle = (chordStyle === 'latin') ? 'american' : 'latin';
    localStorage.setItem('bandapp_chordStyle', chordStyle);
    syncSettingsUI();
    renderChordPro();
    renderGrids();
  }

  const scale = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const scaleLat = ['Do','Do#','RĂ©','RĂ©#','Mi','Fa','Fa#','Sol','Sol#','La','La#','Si'];

  function normalizeNote(note) {
    return note
      .replace('Bb','A#')
      .replace('Db','C#')
      .replace('Eb','D#')
      .replace('Gb','F#')
      .replace('Ab','G#');
  }

  function transChord(chord, steps) {
    return chord.replace(/([A-G][#b]?)/g, (match) => {
      const n = normalizeNote(match);
      const idx = scale.indexOf(n);
      if (idx === -1) return match;
      let newIdx = (idx + steps) % 12;
      if (newIdx < 0) newIdx += 12;
      return (chordStyle === 'latin' ? scaleLat[newIdx] : scale[newIdx]);
    });
  }

  function parseChordProLine(line) {
    let chordLine = '';
    let lyricLine = '';

    let i = 0;
    while (i < line.length) {
      const ch = line[i];

      if (ch === '[') {
        const end = line.indexOf(']', i);
        if (end !== -1) {
          const chordRaw = line.slice(i + 1, end);
          const chord = transChord(chordRaw, transposeValue);

          const pos = lyricLine.length;
          if (chordLine.length < pos) chordLine += ' '.repeat(pos - chordLine.length);
          chordLine = chordLine.slice(0, pos) + chord + chordLine.slice(pos + chord.length);
          i = end + 1;
          continue;
        }
      }

      lyricLine += ch;
      chordLine += (ch === '\t') ? '\t' : ' ';
      i++;
    }

    if (chordLine.length < lyricLine.length) chordLine += ' '.repeat(lyricLine.length - chordLine.length);
    return { chordLine, lyricLine };
  }

  function clearSongContent() {
    songContentEl.replaceChildren();
  }

  function parseZoomIpadDirective(line){
    const m = String(line || "").trim().match(/^\{zoom-ipad\s*:\s*([0-9]*\.?[0-9]+)\s*\}$/i);
    if (!m) return null;
    const v = Number(m[1]);
    if (!isFinite(v) || v <= 0) return null;
    return v;
  }

  function addCenteredTitle(text, level) {
    const el = document.createElement(level === 1 ? 'h1' : 'h2');
    el.style.textAlign = 'center';
    el.style.fontSize = ((level === 1 ? 34 : 20) * currentSongZoom) + 'px';
    if (level === 2) el.style.color = (themeMode === 'light' ? '#555' : '#888');
    el.textContent = text;
    songContentEl.appendChild(el);
  }

  function addCommentLine(text, targetEl) {
    const wrap = document.createElement('div');
    wrap.className = 'commentwrap';

    const span = document.createElement('span');
    span.className = 'commentline';
    span.textContent = text;

    wrap.appendChild(span);
    targetEl.appendChild(wrap);
  }

  function addChordBlock(chordLine, lyricLine, targetEl, anchorId) {
    const block = document.createElement('div');
    block.className = 'block';
    block.style.fontSize = (fontSize * currentSongZoom) + 'px';
    block.dataset.kind = 'lyric';
    if (anchorId) block.dataset.anchor = anchorId;

    const preChord = document.createElement('pre');
    preChord.className = 'chordline';
    preChord.textContent = chordLine;

    const preLyric = document.createElement('pre');
    preLyric.className = 'lyricline';
    preLyric.textContent = lyricLine;

    if (chordLine.trim().length > 0) block.appendChild(preChord);
    block.appendChild(preLyric);
    targetEl.appendChild(block);
  }

  function normAnchorText(s){
    return String(s || "").toLowerCase().replace(/\s+/g, ' ').trim();
  }

  function hashDJB2(str){
    let h = 5381;
    for (let i=0; i<str.length; i++) h = ((h << 5) + h) + str.charCodeAt(i);
    return (h >>> 0).toString(16);
  }

  function parsePUStart(line){
    const m = line.match(/^\{pu\s*:\s*([^}]+)\}$/i);
    if (!m) return null;
    return { user: m[1].trim() };
  }

  function renderPUBlock(targetEl, showContent, label, text){
    const wrap = document.createElement('div');
    wrap.className = 'pu-block';

    const linesCount = (String(text || "").split('\n').length);

    if (showContent) {
      const lab = document.createElement('div');
      lab.className = 'pu-label';
      lab.textContent = label;
      wrap.appendChild(lab);
    } else if (linesCount > 10) {
      const lab = document.createElement('div');
      lab.className = 'pu-label';
      lab.textContent = `SOLO ${label}`;
      wrap.appendChild(lab);
    }

    const pre = document.createElement('pre');
    pre.className = 'pu-pre';
    pre.textContent = showContent
      ? (text || "")
      : Array.from({ length: linesCount }, () => " ").join("\n");

    wrap.appendChild(pre);
    targetEl.appendChild(wrap);
  }

  function renderChordPro() {
    clearSongContent();
    renderChordPro._occ = {};

    const lines = currentRaw.split('\n');

    let zoomSong = 1;
    for (const line of lines) {
      const z = parseZoomIpadDirective(line);
      if (z !== null) { zoomSong = z; break; }
    }

    currentSongZoom = zoomSong;
    songContentEl.style.setProperty('--song-zoom', String(currentSongZoom));

    const overlayLayer = document.createElement('div');
    overlayLayer.id = 'overlayLayer';
    songContentEl.appendChild(overlayLayer);

    let inChorus = false;
    let chorusContainer = null;
    let inPU = false;
    let puUser = "";
    let puBuffer = [];

    for (const lineRaw of lines) {
      const line = String(lineRaw || "");
      if (parseZoomIpadDirective(line) !== null) continue;

      const target = (inChorus && chorusContainer) ? chorusContainer : songContentEl;

      if (!inPU) {
        const start = parsePUStart(line.trim());
        if (start) {
          inPU = true;
          puUser = start.user;
          puBuffer = [];
          continue;
        }
      } else {
        if (/^\{\/pu\s*\}$/i.test(line.trim())) {
          const show = (currentUser || "").toLowerCase() === puUser.toLowerCase();
          const txt = puBuffer.join("\n");
          renderPUBlock(target, show, puUser, txt);
          inPU = false;
          puUser = "";
          puBuffer = [];
          continue;
        }

        puBuffer.push(line);
        continue;
      }

      const title = line.match(/\{(?:t|title)\s*:\s*(.*?)\}/i);
      if (title) { addCenteredTitle(title[1], 1); continue; }

      const subtitle = line.match(/\{(?:st|subtitle)\s*:\s*(.*?)\}/i);
      if (subtitle) { addCenteredTitle(subtitle[1], 2); continue; }

      if (/\{soc\s*:\s*\}/i.test(line) || /\{soc\s*\}/i.test(line)) {
        inChorus = true;
        chorusContainer = document.createElement('div');
        chorusContainer.className = 'chorus-block';
        songContentEl.appendChild(chorusContainer);
        continue;
      }

      if (/\{eoc\s*:\s*\}/i.test(line) || /\{eoc\s*\}/i.test(line)) {
        inChorus = false;
        chorusContainer = null;
        continue;
      }

      const comment = line.match(/\{c\s*:\s*(.*?)\}/i);
      if (comment) {
        addCommentLine(comment[1], target);
        continue;
      }

      const { chordLine, lyricLine } = parseChordProLine(line);
      const key = normAnchorText(lyricLine);
      renderChordPro._occ[key] = (renderChordPro._occ[key] || 0) + 1;
      const anchorId = hashDJB2(key) + "-" + renderChordPro._occ[key];
      addChordBlock(chordLine, lyricLine, target, anchorId);
    }
  }

closeEditor();

  const BACKUP_PREFIXES = ['bandapp_', 'notes:', 'overlay:', 'grids:'];

  function isBackupKey(k) {
    return BACKUP_PREFIXES.some(p => k.startsWith(p));
  }

  function exportBackup() {
    try {
      const data = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key) continue;
        if (!isBackupKey(key)) continue;
        data[key] = localStorage.getItem(key);
      }

      const payload = {
        app: "bandapp",
        schemaVersion: 1,
        exportedAt: new Date().toISOString(),
        data
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const filename = `bandapp-backup-${y}-${m}-${day}.json`;

      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
      showToast("Sauvegarde exportĂ©e âś…");
    } catch (e) {
      console.error(e);
      alert("Erreur export sauvegarde");
    }
  }

  function triggerImport() {
    closeSettings();
    const input = document.getElementById('importFile');
    if (!input) return;
    input.value = "";
    setTimeout(() => input.click(), 80);
  }

  function handleImportFile(event) {
    const file = event?.target?.files?.[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      try {
        const txt = String(reader.result || "");
        const json = JSON.parse(txt);

        if (!json || json.app !== "bandapp" || typeof json.data !== "object") {
          alert("Fichier de sauvegarde invalide.");
          return;
        }

        const keys = Object.keys(json.data);
        for (const k of keys) {
          localStorage.setItem(k, json.data[k]);
        }

        showToast("Sauvegarde importĂ©e âś…");
        setTimeout(() => location.reload(), 600);
      } catch (e) {
        console.error(e);
        alert("Erreur : impossible d'importer la sauvegarde.");
      }
    };
    reader.readAsText(file);
  }

function insertAtCursor(text){
  const ta = document.getElementById('editor-textarea');
  if (!ta) return;

  const start = ta.selectionStart || 0;
  const end = ta.selectionEnd || 0;

  ta.value = ta.value.substring(0, start) + text + ta.value.substring(end);
  ta.selectionStart = ta.selectionEnd = start + text.length;
  ta.focus();

  renderChordBankFromEditor();
}

  function insertTemplatePU(){
    const u = currentUser || "Nom";
    insertAtCursor(`{pu:${u}}\n\n{/pu}\n`);
  }

  function insertTemplateComment(){
    insertAtCursor(`{c: }\n`);
  }

  function extractChordsFromText(text){
    const set = new Set();
    const re = /\[([^\]]+)\]/g;
    let m;
    while ((m = re.exec(text)) !== null){
      set.add(m[1].trim());
    }
    return Array.from(set);
  }

  function renderChordBankFromEditor(){
    const bank = document.getElementById('chordBank');
    if (!bank) return;

    const chords = extractChordsFromText(editorTextarea.value);

    if (!chords.length){
      bank.innerHTML = "";
      return;
    }

    bank.innerHTML =
      "<span style='opacity:.5;font-size:12px;'>Accords:</span>" +
      chords.map(c =>
        `<button class="btn" style="padding:6px 10px;font-size:12px;" onclick="insertAtCursor('[${escapeHtml(c)}]')">${escapeHtml(c)}</button>`
      ).join('');
  }

async function restoreHistoryVersion(historyId) {

  const ok = confirm("Restaurer cette version du morceau ?");
  if (!ok) return;

  const pin = prompt("PIN requis pour restaurer une ancienne version") || "";
  const cleanPin = String(pin).trim();
  if (!cleanPin) return;

  try {
    const res = await fetch('/restore-song', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        fileName: currentFileName,
        historyId,
        pin: cleanPin,
        userName: currentUser
      })
    });

    if (res.ok) {
      closeHistoryModal();
      stopAutoScroll();
      await loadSong(currentFileName);

      if (isLeader) socket.emit('change-song', currentFileName);

      showToast("Version restaurĂ©e âś…");
    } else if (res.status === 403) {

    } else {
      alert("Erreur lors de la restauration");
    }
  } catch (err) {
    console.error(err);
    alert("Erreur lors de la restauration");
  }
}
